name: release

# Build `opp` binaries for every supported platform and attach them (plus
# SHA-256 checksums) to the GitHub Release for the pushed tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  upload:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-musl }
          - { os: macos-13,       target: x86_64-apple-darwin }
          - { os: macos-14,       target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      # Builds the binary (cross-compiling via `cross` when needed), packages it
      # as opp-<tag>-<target>.tar.gz (.zip on Windows), writes a .sha256, and
      # uploads everything to the tag's release (creating it if absent).
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: opp
          target: ${{ matrix.target }}
          archive: opp-$tag-$target
          checksum: sha256
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
